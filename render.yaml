services:
  - type: web
    name: armada-qr-network
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: armada-qr-db
          property: connectionString
      - key: UPLOAD_DIR
        value: ./public/uploads
      - key: MAX_SCAN_RATE
        value: 10
      - key: PUBLIC_URL
        value: https://armada-qr-network.onrender.com

databases:
  - name: armada-qr-db
    plan: free
    region: oregon
    databaseName: armada_qr
    ipAllowList: []
